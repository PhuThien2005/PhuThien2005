<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192" shape-rendering="crispEdges" role="img" aria-label="pixel cat">
  <rect x="60" y="158" width="72" height="9" fill="#000" opacity="0.12">
    <animate attributeName="width" values="72;60;72" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="60;66;60" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="2.4s"
       repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
    <!-- ears -->
    <g fill="#f4a85e">
      <rect x="48" y="36" width="24" height="12"/>
      <rect x="120" y="36" width="24" height="12"/>
    </g>
    <rect x="60" y="36" width="12" height="12" fill="#ff9bb3"/>
    <rect x="120" y="36" width="12" height="12" fill="#ff9bb3"/>
    <!-- head + body -->
    <g fill="#f4a85e">
      <rect x="36" y="48" width="120" height="12"/>
      <rect x="36" y="60" width="120" height="12"/>
      <rect x="36" y="72" width="120" height="12"/>
      <rect x="36" y="84" width="120" height="12"/>
      <rect x="48" y="96" width="96" height="12"/>
      <rect x="48" y="108" width="96" height="12"/>
      <rect x="48" y="120" width="96" height="12"/>
      <rect x="60" y="132" width="72" height="12"/>
    </g>
    <!-- stripes -->
    <g fill="#e0863a">
      <rect x="72" y="48" width="12" height="12"/>
      <rect x="96" y="48" width="12" height="12"/>
      <rect x="120" y="48" width="12" height="12"/>
    </g>
    <!-- tail -->
    <rect x="144" y="84" width="12" height="12" fill="#f4a85e"/>
    <rect x="144" y="96" width="12" height="48" fill="#f4a85e"/>
    <rect x="144" y="108" width="12" height="12" fill="#e0863a"/>
    <rect x="144" y="132" width="12" height="12" fill="#e0863a"/>
    <!-- cheeks -->
    <rect x="36" y="72" width="12" height="12" fill="#ff9bb3"/>
    <rect x="144" y="72" width="12" height="12" fill="#ff9bb3"/>
    <!-- eyes -->
    <g fill="#1d3329">
      <rect x="72" y="60" width="12" height="24">
        <animate attributeName="height" values="24;24;24;6;24;24" keyTimes="0;0.85;0.9;0.93;0.96;1" dur="3.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="108" y="60" width="12" height="24">
        <animate attributeName="height" values="24;24;24;6;24;24" keyTimes="0;0.85;0.9;0.93;0.96;1" dur="3.8s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- nose -->
    <rect x="84" y="84" width="24" height="12" fill="#ff7aa2"/>
    <!-- whiskers -->
    <rect x="24" y="72" width="12" height="4" fill="#c9c9c9"/>
    <rect x="156" y="72" width="12" height="4" fill="#c9c9c9"/>
  </g>
</svg>
